<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>口试具体例子库</title>
<script src="examples.js"></script>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
    background: #f8f6f2;
    color: #2d2a26;
    min-height: 100vh;
  }
  header {
    padding: 22px 16px 10px;
    text-align: center;
  }
  header h1 { margin: 0; font-size: 1.45rem; color: #2d2a26; }
  header p { margin: 4px 0 0; color: #8a8278; font-size: 0.82rem; }

  .search-box {
    max-width: 920px;
    margin: 0 auto;
    padding: 14px 16px 8px;
  }
  .search-box input {
    width: 100%;
    padding: 10px 14px;
    border-radius: 10px;
    border: 1px solid #ddd2c4;
    font-size: 0.95rem;
    background: #fff;
  }

  .toolbar {
    max-width: 920px;
    margin: 0 auto;
    padding: 0 16px 14px;
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .toolbar button {
    padding: 7px 16px;
    border-radius: 8px;
    border: 1px solid #ddd2c4;
    background: #fff;
    color: #6b6358;
    font-size: 0.82rem;
    cursor: pointer;
  }
  .toolbar button:hover { border-color: #999; }

  .toc {
    max-width: 920px;
    margin: 0 auto 18px;
    padding: 0 16px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
  }
  .toc-chip {
    font-size: 0.74rem;
    padding: 4px 10px;
    border-radius: 12px;
    border: 1px solid var(--c);
    color: var(--c);
    cursor: pointer;
    background: #fff;
    white-space: nowrap;
  }
  .toc-chip:hover { background: color-mix(in srgb, var(--c) 12%, white); }

  main { max-width: 920px; margin: 0 auto; padding: 0 16px 60px; }

  /* Topic card */
  .topic-card {
    margin-bottom: 18px;
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid #eee5d8;
    background: #fff;
    scroll-margin-top: 16px;
  }
  .topic-header {
    padding: 14px 20px;
    cursor: pointer;
    border-left: 7px solid var(--tc);
    background: color-mix(in srgb, var(--tc) 7%, white);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .topic-title { font-size: 1.08rem; font-weight: 800; color: var(--tc); flex: 1; }
  .topic-count { font-size: 0.75rem; color: #a89c8c; }
  .chevron { transition: transform 0.2s; color: var(--tc); font-size: 0.85rem; }
  .topic-card.collapsed .chevron { transform: rotate(-90deg); }
  .topic-card.collapsed .topic-body { display: none; }

  .topic-body { padding: 10px 16px 16px; }

  /* Examiner tip box */
  .tip-box {
    background: #fdf7ee;
    border-left: 4px solid #e8b84b;
    border-radius: 0 8px 8px 0;
    padding: 9px 14px;
    margin-bottom: 12px;
    font-size: 0.8rem;
    color: #6b5a2a;
    line-height: 1.55;
  }
  .tip-box::before { content: "📌 Scoring tip: "; font-weight: 700; }

  /* Example rows */
  .example-row {
    border: 1px solid #f0e9dd;
    border-radius: 10px;
    padding: 10px 12px;
    margin: 7px 0;
    background: #fdfcfa;
  }
  .example-row.learned { opacity: 0.45; }
  .example-row.learned .example-text { text-decoration: line-through; color: #b0a89a; }

  .example-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }
  .example-label {
    flex: 1;
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--tc);
    background: color-mix(in srgb, var(--tc) 12%, white);
    padding: 2px 9px;
    border-radius: 8px;
  }
  .example-text {
    font-size: 1rem;
    line-height: 1.75;
    color: #2d2a26;
  }

  /* Row action buttons */
  .row-btn {
    flex: none;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 1px solid #e0d8cc;
    background: #fff;
    cursor: pointer;
    font-size: 0.85rem;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    color: #7a7165;
  }
  .row-btn:hover { border-color: var(--tc); color: var(--tc); }
  .speak-btn.speaking { background: var(--tc); color: #fff; border-color: var(--tc); }
  .learn-btn.is-learned { background: #eef5e8; color: #4a8a3a; border-color: #b9dba3; }

  .hidden { display: none !important; }
  .learned-hidden-mode .example-row.learned { display: none !important; }

  .no-results { text-align: center; padding: 40px; color: #a89c8c; }
</style>
</head>
<body>

<header>
  <h1>口试具体例子库 📚</h1>
  <p>每个主题：考官评分建议（英文）+ 可直接引用的中文具体例子，按主题分类</p>
</header>

<div class="search-box">
  <input type="text" id="searchInput" placeholder="🔍 搜索例子、机构名称或主题（如：SOS、食物银行、环保）...">
</div>

<div class="toolbar">
  <button id="expandAll">展开全部</button>
  <button id="collapseAll">收起全部</button>
  <button id="toggleLearned">隐藏已记住的例子</button>
  <span id="learnedCount" style="align-self:center;color:#a89c8c;font-size:0.8rem;"></span>
</div>

<div class="toc" id="toc"></div>
<main id="main"></main>

<script>
const LEARNED_KEY = 'examples_learned_v1';
const HIDE_KEY    = 'examples_hide_mode_v1';
let learned      = JSON.parse(localStorage.getItem(LEARNED_KEY) || '{}');
let hideMode     = JSON.parse(localStorage.getItem(HIDE_KEY)    || 'false');

function saveLearned() { localStorage.setItem(LEARNED_KEY, JSON.stringify(learned)); }
function exId(ti, ei)  { return ti + '-' + ei; }

function speak(text, btn) {
  if (!('speechSynthesis' in window)) { alert('浏览器不支持语音功能'); return; }
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'zh-CN'; u.rate = 0.9;
  const voices = window.speechSynthesis.getVoices();
  const zh = voices.find(v => v.lang === 'zh-CN') || voices.find(v => v.lang && v.lang.startsWith('zh'));
  if (zh) u.voice = zh;
  document.querySelectorAll('.speak-btn.speaking').forEach(b => b.classList.remove('speaking'));
  btn.classList.add('speaking');
  u.onend = u.onerror = () => btn.classList.remove('speaking');
  window.speechSynthesis.speak(u);
}
if ('speechSynthesis' in window) window.speechSynthesis.getVoices();

function updateCount() {
  const n = Object.values(learned).filter(Boolean).length;
  document.getElementById('learnedCount').textContent = n ? '已记住：' + n + ' 条' : '';
}

function renderToc() {
  const toc = document.getElementById('toc');
  EXAMPLES_MAP.forEach((t, ti) => {
    const chip = document.createElement('div');
    chip.className = 'toc-chip';
    chip.style.setProperty('--c', t.color);
    chip.textContent = t.topic;
    chip.onclick = () => {
      const el = document.getElementById('topic-' + ti);
      el.classList.remove('collapsed');
      el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    };
    toc.appendChild(chip);
  });
}

function renderAll() {
  const main = document.getElementById('main');
  main.innerHTML = '';

  EXAMPLES_MAP.forEach((t, ti) => {
    const card = document.createElement('div');
    card.className = 'topic-card';
    card.id = 'topic-' + ti;
    card.style.setProperty('--tc', t.color);

    // Header
    const hdr = document.createElement('div');
    hdr.className = 'topic-header';
    hdr.innerHTML =
      '<span class="topic-title">' + t.topic + '</span>' +
      '<span class="topic-count">' + t.examples.length + ' 个例子</span>' +
      '<span class="chevron">▼</span>';
    hdr.onclick = () => card.classList.toggle('collapsed');

    // Body
    const body = document.createElement('div');
    body.className = 'topic-body';

    // Tip
    const tip = document.createElement('div');
    tip.className = 'tip-box';
    tip.textContent = t.tip;
    body.appendChild(tip);

    // Examples
    t.examples.forEach((ex, ei) => {
      const id = exId(ti, ei);
      const row = document.createElement('div');
      row.className = 'example-row' + (learned[id] ? ' learned' : '');
      row.dataset.search = (t.topic + ' ' + ex.label + ' ' + ex.text).toLowerCase();

      const rowHdr = document.createElement('div');
      rowHdr.className = 'example-header';

      const labelEl = document.createElement('span');
      labelEl.className = 'example-label';
      labelEl.textContent = ex.label;

      const speakBtn = document.createElement('button');
      speakBtn.className = 'row-btn speak-btn';
      speakBtn.title = '朗读';
      speakBtn.textContent = '🔊';
      speakBtn.onclick = e => { e.stopPropagation(); speak(ex.text, speakBtn); };

      const learnBtn = document.createElement('button');
      learnBtn.className = 'row-btn learn-btn' + (learned[id] ? ' is-learned' : '');
      learnBtn.title = learned[id] ? '标记为未记住' : '标记为已记住';
      learnBtn.textContent = learned[id] ? '✓' : '👁';
      learnBtn.onclick = e => {
        e.stopPropagation();
        learned[id] = !learned[id];
        saveLearned();
        row.classList.toggle('learned', learned[id]);
        learnBtn.classList.toggle('is-learned', learned[id]);
        learnBtn.textContent  = learned[id] ? '✓' : '👁';
        learnBtn.title        = learned[id] ? '标记为未记住' : '标记为已记住';
        updateCount();
      };

      rowHdr.appendChild(labelEl);
      rowHdr.appendChild(speakBtn);
      rowHdr.appendChild(learnBtn);

      const textEl = document.createElement('div');
      textEl.className = 'example-text';
      textEl.textContent = ex.text;

      row.appendChild(rowHdr);
      row.appendChild(textEl);
      body.appendChild(row);
    });

    card.appendChild(hdr);
    card.appendChild(body);
    main.appendChild(card);
  });
}

function applySearch(q) {
  q = q.trim().toLowerCase();
  let any = false;
  document.querySelectorAll('.topic-card').forEach(card => {
    const rows = card.querySelectorAll('.example-row');
    let hit = false;
    rows.forEach(r => {
      const m = q === '' || r.dataset.search.includes(q);
      r.classList.toggle('hidden', !m);
      if (m) hit = true;
    });
    card.classList.toggle('hidden', !hit);
    if (hit) { any = true; if (q) card.classList.remove('collapsed'); }
  });
  let noR = document.getElementById('noResults');
  if (!any) {
    if (!noR) {
      noR = document.createElement('div');
      noR.id = 'noResults'; noR.className = 'no-results';
      noR.textContent = '没有找到相关例子，换个关键词试试 🙂';
      document.getElementById('main').appendChild(noR);
    }
  } else if (noR) noR.remove();
}

function applyHideMode() {
  document.body.classList.toggle('learned-hidden-mode', hideMode);
  document.getElementById('toggleLearned').textContent =
    hideMode ? '显示已记住的例子' : '隐藏已记住的例子';
}

document.getElementById('searchInput').addEventListener('input', e => applySearch(e.target.value));
document.getElementById('expandAll').onclick  = () => document.querySelectorAll('.topic-card').forEach(c => c.classList.remove('collapsed'));
document.getElementById('collapseAll').onclick = () => document.querySelectorAll('.topic-card').forEach(c => c.classList.add('collapsed'));
document.getElementById('toggleLearned').onclick = () => {
  hideMode = !hideMode;
  localStorage.setItem(HIDE_KEY, JSON.stringify(hideMode));
  applyHideMode();
};

renderToc();
renderAll();
updateCount();
applyHideMode();
</script>
</body>
</html>
